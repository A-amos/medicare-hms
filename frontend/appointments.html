<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments — MediCare HMS</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231565c0'/><path d='M16 7v18M7 16h18' stroke='white' stroke-width='3.5' stroke-linecap='round'/></svg>" />
</head>
<body>
<div id="app">

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          id="appt-search"
          class="search-input"
          placeholder="Search by patient or doctor…"
          autocomplete="off"
        />
      </div>
      <span style="font-size:0.8rem;color:var(--text-soft);">
        <span id="appt-count">—</span> appointments
      </span>
    </div>
    <div class="toolbar-right">
      <div class="filter-pills">
        <button class="pill status-pill active" data-value="">All</button>
        <button class="pill status-pill" data-value="Pending">Pending</button>
        <button class="pill status-pill" data-value="Completed">Completed</button>
        <button class="pill status-pill" data-value="Cancelled">Cancelled</button>
      </div>
      <button class="btn btn-amber" id="add-appt-btn" style="color:#fff;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Book Appointment
      </button>
    </div>
  </div>

  <!-- ── Appointments Table ── -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        All Appointments
      </span>
      <span class="text-xs text-muted" style="margin-left:auto;">
        🟡 Yellow rows = today's appointments
      </span>
    </div>
    <div class="card-body no-pad">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="appts-tbody">
            <tr><td colspan="8"><div class="loading-state"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- #app -->

<!-- ── Book / Edit Appointment Modal ── -->
<div class="modal-overlay" id="appt-modal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h2 class="modal-title" id="appt-modal-title">Book Appointment</h2>
      <button class="modal-close" data-close-modal="appt-modal" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="appt-form-alert" class="alert alert-danger hidden"></div>
      <div class="form-grid">

        <div class="form-group">
          <label for="a-patient">Patient <span class="req">*</span></label>
          <select id="a-patient" class="form-ctrl">
            <option value="">— Loading patients… —</option>
          </select>
          <span class="form-hint">
            Not listed? <a href="/patients.html?action=add" style="color:var(--blue);">Register first</a>
          </span>
        </div>

        <div class="form-group">
          <label for="a-doctor">Doctor <span class="req">*</span></label>
          <select id="a-doctor" class="form-ctrl">
            <option value="">— Loading doctors… —</option>
          </select>
        </div>

        <div class="form-group">
          <label for="a-date">Date <span class="req">*</span></label>
          <input type="date" id="a-date" class="form-ctrl" />
        </div>

        <div class="form-group">
          <label for="a-time">Time <span class="req">*</span></label>
          <input type="time" id="a-time" class="form-ctrl" />
        </div>

        <div class="form-group full">
          <label for="a-status">Status</label>
          <select id="a-status" class="form-ctrl">
            <option value="Pending">⏳ Pending</option>
            <option value="Completed">✅ Completed</option>
            <option value="Cancelled">❌ Cancelled</option>
          </select>
        </div>

        <div class="form-group full">
          <label for="a-notes">Notes / Reason for Visit</label>
          <textarea id="a-notes" class="form-ctrl" rows="3" placeholder="Optional: describe the reason for the appointment…"></textarea>
        </div>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal="appt-modal">Cancel</button>
      <button class="btn btn-amber" id="appt-save-btn" style="color:#fff;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Save Appointment
      </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/appointments.js"></script>
<script>
  injectLayout('Appointments');
  initAppointments();

  window.addEventListener('DOMContentLoaded', () => {
    const p = new URLSearchParams(window.location.search);
    if (p.get('action') === 'add') setTimeout(() => openApptModal(), 600);
  });
</script>
</body>
</html>
